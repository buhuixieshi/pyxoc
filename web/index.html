<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Web Chat</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        background: #f4f6fb;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      .wrap {
        max-width: 860px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(16, 24, 40, 0.08);
        overflow: hidden;
      }
      .header {
        padding: 14px 16px;
        background: linear-gradient(90deg, #1f6feb 0%, #1a56d6 100%);
        color: white;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .status {
        font-size: 12px;
        opacity: 0.9;
      }
      .messages {
        height: 62vh;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 86%;
        padding: 10px 12px;
        border-radius: 10px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .msg.user {
        align-self: flex-end;
        background: #e8f0ff;
      }
      .msg.assistant {
        align-self: flex-start;
        background: #f2f4f7;
      }
      .composer {
        padding: 12px;
        border-top: 1px solid #eef2f6;
        display: flex;
        gap: 8px;
      }
      input {
        flex: 1;
        border: 1px solid #d0d7e2;
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
      }
      button {
        border: none;
        border-radius: 8px;
        background: #1f6feb;
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
      }
      button.alt {
        background: #667085;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        padding: 0 12px 12px;
        color: #667085;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="header">
          <span>Agent 聊天前端</span>
          <span id="status" class="status">检查服务中...</span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="composer">
          <input id="input" placeholder="输入你的问题并按回车..." />
          <button id="send">发送</button>
          <button id="clear" class="alt">清空</button>
        </div>
        <div class="footer">
          <span>API: POST /chat</span>
          <span>启动: python web_app.py</span>
        </div>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const sendEl = document.getElementById('send');
      const clearEl = document.getElementById('clear');
      const statusEl = document.getElementById('status');

      function appendMessage(role, text) {
        const node = document.createElement('div');
        node.className = `msg ${role}`;
        node.textContent = text;
        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function checkHealth() {
        try {
          const res = await fetch('/health');
          if (res.ok) {
            statusEl.textContent = '服务在线';
            return;
          }
          statusEl.textContent = '服务异常';
        } catch (_) {
          statusEl.textContent = '无法连接服务';
        }
      }

      async function submitMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        appendMessage('user', text);
        inputEl.value = '';
        sendEl.disabled = true;

        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          const data = await res.json();
          if (!res.ok) {
            appendMessage('assistant', `请求失败：${data.error || '未知错误'}`);
          } else {
            appendMessage('assistant', data.reply || '（空响应）');
          }
        } catch (error) {
          appendMessage('assistant', `网络异常：${error}`);
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      }

      sendEl.addEventListener('click', submitMessage);
      clearEl.addEventListener('click', () => {
        messagesEl.innerHTML = '';
        appendMessage('assistant', '会话视图已清空（不影响后端记忆）。');
      });
      inputEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') submitMessage();
      });

      appendMessage('assistant', '你好，我是 Agent。请开始提问。');
      checkHealth();
      inputEl.focus();
    </script>
  </body>
</html>
